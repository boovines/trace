[project]
name = "trace"
version = "0.1.0"
description = "Record, synthesize, and replay on-screen macOS workflows."
requires-python = ">=3.11"
readme = "README.md"

dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.30",
    "pydantic>=2.8",
    "anthropic>=0.40",
    "jsonschema>=4.23",
]

[project.optional-dependencies]
macos = [
    "pyobjc-framework-Cocoa>=10.3",
    "pyobjc-framework-Quartz>=10.3",
    "pyobjc-framework-ApplicationServices>=10.3",
]
dev = [
    "pytest>=8.3",
    "pytest-asyncio>=0.24",
    "httpx>=0.27",
    "respx>=0.21",
    "mypy>=1.11",
    "ruff>=0.6",
    "pillow>=10.4",
    "types-jsonschema>=4.23",
]

[tool.uv.workspace]
members = ["services/recorder", "services/synthesizer", "services/runner"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM", "RUF"]

[tool.mypy]
python_version = "3.11"
strict = true
files = ["services/runner/src", "gateway"]
mypy_path = "services/runner/src:services/synthesizer"
explicit_package_bases = true

[[tool.mypy.overrides]]
module = ["Cocoa.*", "Quartz.*", "ApplicationServices.*", "AppKit.*", "respx.*"]
ignore_missing_imports = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
pythonpath = ["services/runner/src", "services/synthesizer"]
markers = [
    "macos: test requires a real macOS main display (skipped in CI and Ralph iterations)",
    "live_input: test posts real events via CGEventPost; skipped unless --run-live-input is passed",
]
