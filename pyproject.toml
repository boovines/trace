[project]
name = "trace"
version = "0.1.0"
description = "Record, synthesize, and replay on-screen macOS workflows."
requires-python = ">=3.11"
readme = "README.md"

dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.30",
    "pydantic>=2.8",
    "anthropic>=0.40",
    "jsonschema>=4.23",
]

[project.optional-dependencies]
macos = [
    "pyobjc-framework-Cocoa>=10.3",
    "pyobjc-framework-Quartz>=10.3",
    "pyobjc-framework-ApplicationServices>=10.3",
]
dev = [
    "pytest>=8.3",
    "pytest-asyncio>=0.24",
    "httpx>=0.27",
    "mypy>=1.11",
    "ruff>=0.6",
]

[tool.uv.workspace]
members = ["services/recorder", "services/synthesizer", "services/runner"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM", "RUF"]

[tool.ruff.lint.per-file-ignores]
# draft_prompt.py embeds the full LLM system prompt as a multi-line string;
# prose paragraphs regularly exceed 100 chars and hard-wrapping them would
# only obscure the content the model actually sees.
"services/synthesizer/src/synthesizer/draft_prompt.py" = ["E501"]
"services/synthesizer/src/synthesizer/revise_prompt.py" = ["E501"]
"services/synthesizer/src/synthesizer/similarity.py" = ["E501"]

[tool.mypy]
python_version = "3.11"
strict = true
files = ["services", "gateway"]

[[tool.mypy.overrides]]
module = ["Cocoa.*", "Quartz.*", "ApplicationServices.*", "AppKit.*"]
ignore_missing_imports = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
